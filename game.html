<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Game Zone</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
   
   <div class="bg items-center justify-center flex" style="position: relative; ">
      <div class=" shadow-2xl " style="width: 500px; height: 600px; background-color: white; border-radius: 10px;">
        <h1 class="text-center py-5 text-2xl font-bold mt-10">Stone Paper Scissors</h1>
        <div class="weapon-box">
        <p class="text-center text-xl font-bold mt-15">Select your Weapon</p>
        <div class="flex justify-evenly  mt-20 weapons">
         <div class="Rock">
            <img id="images" src="./images/Rock.png" alt="Rock">
         </div>
         <div class="Paper">
            <img id="images" src="./images/Paper.png" alt="Paper">
         </div>
         <div class="Scissor">
            <img id="images" src="./images/Scissor.png" alt="Scissor">
         </div>
        </div>
        </div>
        <div class="player">
        <h3 class="text-xl font-bold text-center" style="word-spacing: 100px;">Player <span>v/s</span> Computer</h3>
        <div class="player-choice">
           <img src="./images/Rock.png" alt="">
        </div>
        <div class="computer-choice">
             <img src="./images/Rock.png" alt="">
        </div>
        </div>
        <div class="result-container">
         <h3 class="text-center font-bold mt-5 " id="textresult"></h3>
         <div class="text-center mt-5">
         <button class="rounded px-2 py-1 button">Play Again</button>
         </div>
        </div>
        <div class="score flex justify-evenly items-center  mt-20 py-3 mx-auto w-[500px]">
         <div class="won">
            <h3 class="text-xl font-bold" >Won: <span>0</span></h3>
         </div>
         <div class="lost">
            <h3 class="text-xl font-bold" >Lost: <span>0</span></h3>
         </div>
         <div class="draw">
            <h3 class="text-xl font-bold" >Draw: <span>0</span></h3>
         </div>
        </div>
        
      </div>
   </div> 
   
</body>
<script src="./main.js">

</script>
</html>
